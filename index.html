<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

UPMIP Subsidy Calculator

</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>

UPMIP Subsidy Calculator

</h1>

<p class="author">

Designed by

<strong>

Er. Kaushal Shakya

</strong>

(Agril. Engineer)

</p>
<label>

System Type

</label>

<select id="system" onchange="changeSpacing()">

<option value="drip">

Drip

</option>

<option value="mini">

Mini Sprinkler

</option>

</select>
<label>

Spacing

</label>

<select id="spacing">

<option value="1.2x0.6">

1.2 × 0.6

</option>

<option value="1.5x0.6">

1.5 × 0.6

</option>

<option value="1.8x0.6">

1.8 × 0.6

</option>

<option value="2.5x0.6">

2.5 × 0.6

</option>

<option value="1.5x1.5">

1.5 × 1.5

</option>

</select>

<label>

Area (Hectare)

</label>

<input
type="number"
step="0.001"
id="area">

<button
onclick="calculate()">

Calculate

</button>

<div class="result">

<h2 id="unitCost"></h2>

<hr>

<h2 id="subsidy90"></h2>

<h2 id="share10"></h2>

<hr>

<h2 id="subsidy80"></h2>

<h2 id="share20"></h2>

</div>

<div class="buttons">

<button
onclick="copyResult()">

Copy Result

</button>

<button
onclick="shareWhatsApp()">

WhatsApp Share

</button>

</div>

<footer>

© 2026

Developed by

<b>

Er. Kaushal Shakya

</b>

(Agril. Engineer)

</footer>

</div>

<script src="script.js">

</script>

</body>

</html>
